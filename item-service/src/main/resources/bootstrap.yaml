spring:
  application:
    name: item-service # 服务名称
  profiles:
    active: dev
  cloud:
    nacos:
      server-addr: 192.168.3.106:8848 # nacos地址
      discovery:
        enabled: true # 启用服务发现
        register-enabled: true # item-service需要注册到Nacos
      config:
        file-extension: yaml # 文件后缀名
        shared-configs: # 共享配置
          - dataId: shared-jdbc.yaml # 共享mybatis配置
          - dataId: shared-log.yaml # 共享日志配置
          - dataId: shared-swagger.yaml # 共享 swagger 配置
          - dataId: shared-seata.yaml # 共享seata配置
          - dataId: shared-mq.yaml # 共享mq配置